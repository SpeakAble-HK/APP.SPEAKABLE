services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - speakable
    restart: unless-stopped

  speakable:
    build: .
    restart: unless-stopped

volumes:
  caddy_data:
